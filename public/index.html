<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Flowaux is preparing a location-first marketplace experience for parking, rentals, and services."
    />
    <meta name="theme-color" content="#0b0b0c" />
    <title>Flowaux | Coming Soon</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08090a;
        --panel: rgba(255, 255, 255, 0.06);
        --text: #f8fafc;
        --muted: #a3aab8;
        --line: rgba(255, 255, 255, 0.14);
        --green: #74ff2b;
        --red: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 50% -10%, rgba(116, 255, 43, 0.18), transparent 32rem),
          linear-gradient(180deg, #101214 0%, var(--bg) 56%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        align-items: center;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        padding: 32px 18px;
      }

      .shell {
        align-items: center;
        display: flex;
        flex-direction: column;
        gap: 26px;
        max-width: 680px;
        text-align: center;
        width: 100%;
      }

      .brand {
        align-items: center;
        display: inline-flex;
        gap: 14px;
      }

      .mark {
        align-items: center;
        background: var(--green);
        border-radius: 18px;
        box-shadow: 0 18px 44px rgba(116, 255, 43, 0.22);
        display: grid;
        height: 64px;
        justify-content: center;
        width: 64px;
      }

      .mark svg {
        display: block;
      }

      .wordmark {
        font-size: clamp(34px, 7vw, 58px);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 1;
      }

      .heart {
        color: var(--red);
        font-size: 0.72em;
        margin-left: 8px;
        vertical-align: 0.06em;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
        padding: clamp(26px, 5vw, 46px);
        width: min(100%, 580px);
      }

      .eyebrow {
        color: var(--green);
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.12em;
        margin: 0 0 14px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(36px, 8vw, 72px);
        font-weight: 950;
        letter-spacing: 0;
        line-height: 0.96;
        margin: 0;
      }

      .copy {
        color: var(--muted);
        font-size: clamp(15px, 2.5vw, 18px);
        font-weight: 650;
        line-height: 1.55;
        margin: 20px auto 0;
        max-width: 460px;
      }

      .domain {
        border-top: 1px solid var(--line);
        color: #d8dde7;
        font-size: 14px;
        font-weight: 800;
        margin-top: 28px;
        padding-top: 20px;
      }

      @media (prefers-reduced-motion: no-preference) {
        .shell {
          animation: rise 620ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }

        @keyframes rise {
          from {
            opacity: 0;
            transform: translateY(14px);
          }

          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="Flowaux coming soon">
      <section class="shell">
        <div class="brand" aria-label="Flowaux">
          <div class="mark" aria-hidden="true">
            <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M9 29V8.5h12.1c5.2 0 8.9 3.1 8.9 7.8 0 4.8-3.7 7.9-8.9 7.9h-5.4V29H9Z"
                fill="#070809"
              />
              <path
                d="M15.7 18.5h4.9c1.9 0 3.1-.9 3.1-2.2s-1.2-2.1-3.1-2.1h-4.9v4.3Z"
                fill="#74FF2B"
              />
              <path d="M16 29c4.7 0 8.5-3.8 8.5-8.5H16V29Z" fill="#070809" />
            </svg>
          </div>
          <div class="wordmark">Flowaux<span class="heart" aria-hidden="true">♥</span></div>
        </div>

        <div class="panel">
          <p class="eyebrow">Launching soon</p>
          <h1>Coming soon</h1>
          <p class="copy">
            We are building a location-first marketplace for parking, rentals, and services.
          </p>
          <p class="domain">flowaux.in</p>
        </div>
      </section>
    </main>
  </body>
</html>
