name: urban_parking
description: Production Flutter migration of the Lotzi marketplace.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter:
    sdk: flutter
  flutter_image_compress: ^2.4.0
  flutter_local_notifications: ^21.0.0
  flutter_map: ^8.3.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.2
  go_router: ^17.2.3
  google_maps_flutter: ^2.17.0
  google_sign_in: ^7.2.0
  hive_flutter: ^1.1.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  json_annotation: ^4.11.0
  latlong2: ^0.9.1
  logger: ^2.7.0
  permission_handler: ^12.0.1
  riverpod_annotation: ^4.0.2
  supabase_flutter: ^2.12.4
  table_calendar: ^3.2.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.2
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - src/assets/
    - src/assets/home/
    - src/assets/onboarding_screen_img/
    - src/assets/onboarding_screen_img/user_role/
